name: Build Printing Packages (IPQ807x SDK - Final Try)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gawk flex git wget unzip python3 python3-pip python3-setuptools python3-wheel zstd libncurses-dev libssl-dev file rsync

    - name: Download and extract SDK
      run: |
        wget -q https://downloads.openwrt.org/snapshots/targets/qualcommax/ipq807x/openwrt-sdk-qualcommax-ipq807x_gcc-14.3.0_musl.Linux-x86_64.tar.zst
        tar -xf openwrt-sdk-qualcommax-ipq807x_gcc-14.3.0_musl.Linux-x86_64.tar.zst
        mv openwrt-sdk-qualcommax-ipq807x_gcc-14.3.0_musl.Linux-x86_64 openwrt-sdk

    - name: Configure feeds and target
      run: |
        cd openwrt-sdk
        cp feeds.conf.default feeds.conf
        echo "src-git printing https://github.com/woniuzfb/openwrt-24-printing-packages.git" >> feeds.conf
        ./scripts/feeds update -a
        ./scripts/feeds install -a

        # 修改点：必须在 .config 中显式勾选这些包，否则编译会被跳过
        cat > .config <<'EOF'
        CONFIG_TARGET_qualcommax=y
        CONFIG_TARGET_qualcommax_ipq807x=y
        CONFIG_TARGET_DEVICE_qualcommax_ipq807x_DEVICE_aliyun_ap8220=y
        # 显式开启打印核心包
        CONFIG_PACKAGE_cups=y
        CONFIG_PACKAGE_ghostscript=y
        CONFIG_PACKAGE_lcms2=y
        CONFIG_PACKAGE_qpdf=y
        EOF

        # 这一步会自动补全剩余的依赖配置
        make defconfig

    - name: Build printing packages (auto scan)
      run: |
        cd openwrt-sdk
        echo "=== Start building and packaging ==="
        # 移除 >/dev/null，我们需要看到底是哪里报错
        for pkg in $(ls -1 package/feeds/printing); do
          if [ "$pkg" = "python3-dbus" ]; then continue; fi # 跳过已知的坑
          echo ">>> Processing $pkg ..."
          make package/feeds/printing/$pkg/install -j$(nproc) V=s || echo "!!! $pkg failed"
        done

    - name: List generated IPK files
      run: |
        cd openwrt-sdk
        echo "=== Printing IPK files ==="
        # 只有编译成功才会生成 bin 目录
        [ -d "bin" ] && find bin/ -type f -name "*.ipk" || echo "No bin directory found"

    - name: Upload all IPK artifacts
      uses: actions/upload-artifact@v4
      if: always() # 即使部分失败也尝试上传
      with:
        name: all-ipk
        path: openwrt-sdk/bin/packages/
