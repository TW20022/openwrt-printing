name: Build HPLIP Package (MT7621 SDK)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gawk flex git wget unzip python3 python3-pip \
          python3-setuptools python3-wheel zstd pkg-config libncurses5-dev libssl-dev file

    - name: Download and extract SDK
      run: |
        wget -q https://downloads.openwrt.org/releases/24.10.5/targets/ramips/mt7621/openwrt-sdk-24.10.5-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst
        tar -xf openwrt-sdk-24.10.5-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst
        mv openwrt-sdk-24.10.5-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64 openwrt-sdk

    - name: Configure feeds
      run: |
        cd openwrt-sdk
        cp feeds.conf.default feeds.conf
        echo "src-git printing https://github.com/woniuzfb/openwrt-24-printing-packages.git" >> feeds.conf
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # 使用 GitHub Actions 缓存来加速后续编译中的源码下载
    - name: Cache dl directory
      uses: actions/cache@v4
      with:
        path: openwrt-sdk/dl
        key: ${{ runner.os }}-openwrt-dl-${{ hashFiles('**/Makefile') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-dl-

    - name: Patch Makefiles (Inline Fixes)
      run: |
        # 1. 修复 dbus：确保它安装开发头文件到 staging_dir
        cd openwrt-sdk/feeds/packages/utils/dbus
        if ! grep -q "Build/InstallDev" Makefile; then
          sed -i '/include $(INCLUDE_DIR)\/package.mk/a PKG_INSTALL:=1' Makefile
          sed -i '/\$(eval \$(call BuildPackage,dbus))/i \
        define Build/InstallDev \
        	$(INSTALL_DIR) $(1)/usr/include/dbus-1.0 \
        	$(CP) $(PKG_INSTALL_DIR)/usr/include/dbus-1.0/* $(1)/usr/include/dbus-1.0/ \
        	$(INSTALL_DIR) $(1)/usr/lib/pkgconfig \
        	$(INSTALL_DATA) $(PKG_INSTALL_DIR)/usr/lib/pkgconfig/dbus-1.pc $(1)/usr/lib/pkgconfig/ \
        endef \
        ' Makefile
        fi

        # 2. 修复 python3-dbus：强制指定依赖和 32 位标识
        cd ../../../printing/python3-dbus
        sed -i '/include $(INCLUDE_DIR)\/package.mk/a PKG_BUILD_DEPENDS:=dbus python3/host' Makefile
        # 针对 MIPS32 架构的修复
        sed -i '/include $(INCLUDE_DIR)\/package.mk/a TARGET_CFLAGS += -DLONG_BIT=32' Makefile

    - name: Final Config and Download
      run: |
        cd openwrt-sdk
        # 明确启用需要的包
        echo "CONFIG_PACKAGE_dbus=y" >> .config
        echo "CONFIG_PACKAGE_python3-light=y" >> .config
        echo "CONFIG_PACKAGE_python3-dbus=y" >> .config
        echo "CONFIG_PACKAGE_hplip=y" >> .config
        
        make defconfig
        # 预下载所有源码包，避免编译中途网络错误
        make download -j8

    - name: Build Packages
      run: |
        cd openwrt-sdk
        # 严格按照顺序编译，确保 staging_dir 依赖链完整
        echo "Building dbus..."
        make package/dbus/compile V=s -j$(nproc)
        
        echo "Building python3-dbus..."
        make package/python3-dbus/compile V=s -j$(nproc)
        
        echo "Building hplip..."
        make package/hplip/compile V=s -j$(nproc)

    - name: Collect IPKs
      run: |
        mkdir -p output
        find openwrt-sdk/bin/packages -type f -name "*.ipk" -exec cp {} output/ \;
        echo "=== Found IPKs ==="
        ls -lh output/

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mt7621-hplip-packages
        path: output/*.ipk
