name: Build HPLIP Package (MT7621 SDK)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gawk flex git wget unzip python3 python3-pip \
          python3-setuptools python3-wheel zstd pkg-config libncurses5-dev libssl-dev file

    - name: Download and extract SDK
      run: |
        wget -q https://downloads.openwrt.org/releases/24.10.5/targets/ramips/mt7621/openwrt-sdk-24.10.5-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst
        tar -xf openwrt-sdk-24.10.5-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst
        mv openwrt-sdk-24.10.5-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64 openwrt-sdk

    - name: Configure feeds and target
      run: |
        cd openwrt-sdk
        cp feeds.conf.default feeds.conf
        echo "src-git printing https://github.com/woniuzfb/openwrt-24-printing-packages.git" >> feeds.conf
        ./scripts/feeds update -a
        ./scripts/feeds install -a

        cat > .config <<'EOF'
        CONFIG_TARGET_ramips=y
        CONFIG_TARGET_ramips_mt7621=y
        CONFIG_TARGET_ramips_mt7621_Generic=y
        CONFIG_PACKAGE_dbus=y
        CONFIG_PACKAGE_python3-light=y
        CONFIG_PACKAGE_python3-dbus=y
        CONFIG_PACKAGE_hplip=y
        EOF

        make defconfig

    - name: Patch dbus Makefile (Critical Fix)
      run: |
        # 进入 dbus 目录
        cd openwrt-sdk/feeds/packages/utils/dbus
        
        # 1. 插入 PKG_INSTALL:=1 确保编译后进行伪安装
        sed -i '/include $(INCLUDE_DIR)\/package.mk/a PKG_INSTALL:=1' Makefile
        
        # 2. 在第一个 eval 调用之前插入 Build/InstallDev 宏
        # 否则追加到末尾会被编译引擎忽略
        sed -i '/\$(eval/i \
        define Build/InstallDev \
        	$(INSTALL_DIR) $(1)/usr/include/dbus-1.0 \
        	$(CP) $(PKG_INSTALL_DIR)/usr/include/dbus-1.0/* $(1)/usr/include/dbus-1.0/ \
        	$(INSTALL_DIR) $(1)/usr/lib/pkgconfig \
        	$(INSTALL_DATA) $(PKG_INSTALL_DIR)/usr/lib/pkgconfig/dbus-1.pc $(1)/usr/lib/pkgconfig/ \
        endef \
        ' Makefile

    - name: Patch python3-dbus Makefile
      run: |
        cd openwrt-sdk/feeds/printing/python3-dbus
        # 确保依赖 python3-host
        sed -i '/include $(INCLUDE_DIR)\/package.mk/a PKG_BUILD_DEPENDS:=python3/host' Makefile
        # 修正 32位 架构定义
        sed -i '/include $(INCLUDE_DIR)\/package.mk/a TARGET_CFLAGS += -DLONG_BIT=32' Makefile

    - name: Build dbus
      run: |
        cd openwrt-sdk
        # 先编译依赖包，确保其生成的 .pc 文件进入 staging_dir
        make package/dbus/compile V=s -j$(nproc)
        
        echo "=== Verifying dbus-1.pc location ==="
        find staging_dir -name "dbus-1.pc"

    - name: Build python3-dbus
      run: |
        cd openwrt-sdk
        # 设置环境变量让 pkg-config 能在 SDK 的 staging 目录找到 dbus
        export PKG_CONFIG_PATH=$(find $(pwd)/staging_dir -name pkgconfig -type d | head -n 1)
        make package/python3-dbus/compile V=s -j$(nproc)

    - name: Build hplip
      run: |
        cd openwrt-sdk
        make package/hplip/compile V=s -j$(nproc)

    - name: Check and Collect IPKs
      run: |
        cd openwrt-sdk
        echo "=== Generated IPK files ==="
        find bin/packages -type f -name "*.ipk"
        # 统一复制到一个目录方便上传
        mkdir -p ../output
        find bin/packages -type f -name "*.ipk" -exec cp {} ../output/ \;

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mt7621-printing-packages
        path: output/*.ipk
