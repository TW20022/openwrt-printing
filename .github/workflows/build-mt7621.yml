name: Build Printing Packages (MT7621 SDK)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gawk flex git wget unzip python3 python3-pip python3-setuptools python3-wheel

    - name: Download and extract SDK
      run: |
        wget -q https://downloads.openwrt.org/releases/24.10.5/targets/ramips/mt7621/openwrt-sdk-24.10.5-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.xz
        tar -xf openwrt-sdk-24.10.5-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.xz
        mv openwrt-sdk-24.10.5-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64 openwrt-sdk

    - name: Configure feeds and target
      run: |
        cd openwrt-sdk
        cp feeds.conf.default feeds.conf
        echo "src-git printing https://github.com/woniuzfb/openwrt-24-printing-packages.git" >> feeds.conf
        ./scripts/feeds update -a >/dev/null
        ./scripts/feeds install -a >/dev/null

        # 精简 .config
        cat > .config <<'EOF'
        CONFIG_TARGET_ramips=y
        CONFIG_TARGET_ramips_mt7621=y
        CONFIG_TARGET_ramips_mt7621_Generic=y
        EOF

        make defconfig >/dev/null

    - name: Show printing feed packages
      run: |
        cd openwrt-sdk
        echo "=== Printing feed packages ==="
        ls -1 package/feeds/printing

    - name: Build printing packages (auto scan)
      run: |
        cd openwrt-sdk
        echo "=== Start building printing packages ==="
        for pkg in $(ls -1 package/feeds/printing); do
          echo ">>> Building $pkg ..."
          make package/feeds/printing/$pkg/compile -j$(nproc) >/dev/null 2>&1 || echo "!!! $pkg failed"
        done
        echo "=== Build finished ==="

    - name: List generated IPK files
      run: |
        cd openwrt-sdk
        echo "=== Printing IPK files ==="
        find bin/packages -type f -name "*.ipk"

    - name: Upload all IPK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: all-ipk
        path: openwrt-sdk/bin/packages/**/*.ipk
