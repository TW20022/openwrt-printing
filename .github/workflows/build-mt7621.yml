name: Build Printing Packages (MT7621, v24.10.5)

on:
  workflow_dispatch:   # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev gawk flex git wget unzip python3 python3-pip python3-setuptools python3-wheel

    - name: Clone OpenWrt source
      run: |
        git clone https://github.com/openwrt/openwrt.git
        cd openwrt
        git checkout v24.10.5
        cp feeds.conf.default feeds.conf
        sed -i '1i\\src-git printing https://github.com/woniuzfb/openwrt-24-printing-packages.git' feeds.conf
        sed -i '/--keep-system-cflags\\|--keep-system-libs/d' tools/pkgconf/files/pkg-config

    - name: Configure feeds and target
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        wget https://downloads.openwrt.org/releases/24.10.5/targets/ramips/mt7621/config.buildinfo
        cp config.buildinfo .config
        make defconfig
        # 将 printing feed 里的所有包设为 M
        for pkg in $(./scripts/feeds list -n printing | awk '{print $1}'); do
          scripts/config --module PACKAGE_$pkg || true
        done

    - name: Build printing packages
      run: |
        cd openwrt
        # 编译 printing feed 下的所有包
        for pkg in $(./scripts/feeds list -n printing | awk '{print $1}'); do
          make package/$pkg/compile -j$(nproc) V=s || true
        done

    - name: Upload IPK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: printing-ipk
        path: openwrt/bin/packages/mipsel_24kc/printing/*.ipk
