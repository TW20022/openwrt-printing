name: Build Printing Packages (IPQ807X SDK)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gawk flex git wget unzip python3 python3-pip \
        python3-setuptools python3-wheel zstd libncurses-dev libssl-dev file rsync

    - name: Download and extract SDK
      run: |
        wget -q https://downloads.openwrt.org/snapshots/targets/qualcommax/ipq807x/openwrt-sdk-qualcommax-ipq807x_gcc-14.3.0_musl.Linux-x86_64.tar.zst
        tar -xf openwrt-sdk-qualcommax-ipq807x_gcc-14.3.0_musl.Linux-x86_64.tar.zst
        mv openwrt-sdk-qualcommax-ipq807x_gcc-14.3.0_musl.Linux-x86_64 openwrt-sdk

    - name: Configure feeds
      run: |
        cd openwrt-sdk
        cp feeds.conf.default feeds.conf
        echo "src-git printing https://github.com/woniuzfb/openwrt-24-printing-packages.git" >> feeds.conf
        
        ./scripts/feeds update -a
        # 关键：只安装打印包，避开 asterisk 等无效插件导致的 Kconfig 循环依赖
        ./scripts/feeds install -p printing -a
        ./scripts/feeds install luci-base luci-app-usb-printer

    - name: Configure Target
      run: |
        cd openwrt-sdk
        cat > .config <<'EOF'
        CONFIG_TARGET_qualcommax=y
        CONFIG_TARGET_qualcommax_ipq807x=y
        CONFIG_TARGET_DEVICE_qualcommax_ipq807x_DEVICE_aliyun_ap8220=y
        EOF
        
        # 强制补全依赖
        make defconfig

    - name: Build printing packages (Legacy LS Loop)
      run: |
        cd openwrt-sdk
        echo "=== Start building printing packages ==="
        # 回到你最初成功的 ls 逻辑，但指向正确的 package 路径
        # SDK 会将 feed 包链接到 package/feeds/printing/
        
        PKGS=$(ls -1 package/feeds/printing)
        for pkg in $PKGS; do
          echo ">>> Building $pkg ..."
          # 尝试多线程，失败则单线程输出详细日志
          make package/feeds/printing/$pkg/compile -j$(nproc) || \
          make package/feeds/printing/$pkg/compile -j1 V=s || echo "!!! $pkg build failed, skipping..."
        done
        echo "=== Build finished ==="

    - name: List and Upload IPKs
      run: |
        cd openwrt-sdk
        find bin/packages -type f -name "*.ipk"
        
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ipq807x-printing-ipk
        path: openwrt-sdk/bin/packages/**/*.ipk
