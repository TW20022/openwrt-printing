name: Build Printing Packages (ImmortalWrt - Deep Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gawk flex bison git wget unzip python3 python3-pip \
          python3-setuptools python3-wheel zstd libncurses-dev libssl-dev file rsync patch itstool gettext

      - name: Expand Swap Space
        run: |
          sudo swapoff -a || true
          sudo dd if=/dev/zero of=/swapfile_fix bs=1M count=4096
          sudo chmod 600 /swapfile_fix
          sudo mkswap /swapfile_fix
          sudo swapon /swapfile_fix
          free -h
        continue-on-error: true

      - name: Download and extract SDK
        run: |
          wget -q https://downloads.openwrt.org/snapshots/targets/qualcommax/ipq807x/openwrt-sdk-qualcommax-ipq807x_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          tar -xf openwrt-sdk-qualcommax-ipq807x_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          mv openwrt-sdk-qualcommax-ipq807x_gcc-14.3.0_musl.Linux-x86_64 openwrt-sdk

      - name: Fix Feeds and Recursive Dependencies
        run: |
          cd openwrt-sdk
          cp feeds.conf.default feeds.conf
          # 1. 注入自定义源到首行
          sed -i '1i src-git printing https://github.com/woniuzfb/openwrt-24-printing-packages.git' feeds.conf
          ./scripts/feeds update -a

          # 2. 【核心手术】修复 libcurl 导致的 Kconfig 循环依赖循环
          # 搜索所有包含此冲突的文件并强行删除冲突行
          find feeds/ -name "Config.in" -exec sed -i '/depends on PACKAGE_libcurl/d' {} + || true
          
          # 3. 物理清理冲突路径 (针对 ImmortalWrt 内置包)
          rm -rf package/utils/cups
          rm -rf package/feeds/packages/cups
          rm -rf tmp # 必须删除缓存，否则报错信息会残留

          # 4. 强制安装 woniuzfb 的包链
          ./scripts/feeds install -f -p printing cups ghostscript lcms2 qpdf poppler libcupsfilters libppd
          ./scripts/feeds install -f bison flex
          ./scripts/feeds install -p printing -a
          ./scripts/feeds install -a # 补全基础依赖
          
          # 5. 再次清理 tmp 并生成配置（确保不会因为旧索引报错）
          rm -rf tmp
          ./scripts/feeds install -a

      - name: Configure Target
        run: |
          cd openwrt-sdk
          cat > .config <<'EOF'
          CONFIG_TARGET_qualcommax=y
          CONFIG_TARGET_qualcommax_ipq807x=y
          CONFIG_TARGET_DEVICE_qualcommax_ipq807x_DEVICE_aliyun_ap8220=y
          CONFIG_PACKAGE_cups=y
          CONFIG_PACKAGE_ghostscript=y
          CONFIG_PACKAGE_python3-dbus=n
          CONFIG_PACKAGE_hplip=n
          EOF
          # 如果 defconfig 还是报错，说明还有更深的依赖冲突，这里使用强制模式
          make defconfig || (echo "Defconfig failed, checking logs..." && exit 1)

      - name: Build Printing Packages (Layered Execution)
        run: |
          cd openwrt-sdk
          
          echo "=== Phase 0: Common Libraries ==="
          for core in lcms2 libcairo libcupsfilters libppd qpdf poppler; do
            # 自动探测路径，防止 No rule to make target
            TARGET=$(find package/feeds/ -name "$core" -type d | head -n 1 | sed 's|^package/||')
            if [ -n "$TARGET" ]; then
              make $TARGET/install -j$(nproc) || echo "$core skip"
            fi
          done

          echo "=== Phase 1: CUPS ==="
          CUPS_T=$(find package/feeds/ -name "cups" -type d | head -n 1 | sed 's|^package/||')
          make $CUPS_T/install -j$(nproc) || make $CUPS_T/install -j1 V=s || exit 1

          echo "=== Phase 2: Ghostscript ==="
          GS_T=$(find package/feeds/ -name "ghostscript" -type d | head -n 1 | sed 's|^package/||')
          make $GS_T/install -j$(nproc) || make $GS_T/install -j1 V=s || exit 1

          echo "=== Phase 3: Other Drivers ==="
          for pkg_dir in package/feeds/printing/*; do
            pkg=$(basename "$pkg_dir")
            if [[ "$pkg" == "ghostscript" || "$pkg" == "cups" || "$pkg" == "hplip" || \
                  "$pkg" == "lcms2" || "$pkg" == "libcairo" || "$pkg" == "libcupsfilters" || \
                  "$pkg" == "libppd" || "$pkg" == "qpdf" || "$pkg" == "poppler" || \
                  "$pkg" == python* ]]; then
              continue
            fi
            make package/feeds/printing/$pkg/install -j$(nproc) || echo "Skip $pkg"
          done

      - name: Collect and List IPKs
        run: |
          cd $GITHUB_WORKSPACE/openwrt-sdk
          mkdir -p ALL_IPKS
          find bin/ -type f -name "*.ipk" ! -name "*-dbgsym_*" -exec cp {} ALL_IPKS/ \;
          ls -lh ALL_IPKS || echo "No IPKs found"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipq807x-printing-fixed
          path: openwrt-sdk/ALL_IPKS/
