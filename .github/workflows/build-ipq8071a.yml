name: Build Printing Packages (IPQ807x SDK - The Truth)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        # 补全宿主机必须的工具，防止 qpdf 等包由于缺库而暴毙
        sudo apt-get install -y build-essential gawk flex bison git wget unzip \
        python3 python3-pip python3-setuptools python3-wheel python3-dev \
        zstd libncurses-dev libssl-dev file rsync itstool gettext \
        libjpeg-dev zlib1g-dev libpixman-1-dev

    - name: Download and extract SDK
      run: |
        wget -q https://downloads.openwrt.org/snapshots/targets/qualcommax/ipq807x/openwrt-sdk-qualcommax-ipq807x_gcc-14.3.0_musl.Linux-x86_64.tar.zst
        tar -xf openwrt-sdk-qualcommax-ipq807x_gcc-14.3.0_musl.Linux-x86_64.tar.zst
        mv openwrt-sdk-qualcommax-ipq807x_gcc-14.3.0_musl.Linux-x86_64 openwrt-sdk

    - name: Configure feeds and target
      run: |
        cd openwrt-sdk
        cp feeds.conf.default feeds.conf
        echo "src-git printing https://github.com/woniuzfb/openwrt-24-printing-packages.git" >> feeds.conf
        
        ./scripts/feeds update -a >/dev/null
        ./scripts/feeds install -a >/dev/null

        # 物理切除导致配置崩溃的无关包
        rm -rf feeds/packages/mail/mutt feeds/packages/mail/postfix feeds/packages/mail/dovecot
        rm -rf feeds/packages/admin/rsyslog feeds/packages/net/gensio feeds/packages/net/asterisk
        rm -rf feeds/packages/utils/qemu feeds/packages/net/etebase
        find feeds/ -name "Config.in" -exec sed -i '/select PACKAGE_libcairo/d' {} + || true
        rm -rf tmp

        # 【核心】：一定要有这些 =y，编译器才会在 compile 时生成 ipk
        cat > .config <<'EOF'
        CONFIG_TARGET_qualcommax=y
        CONFIG_TARGET_qualcommax_ipq807x=y
        CONFIG_TARGET_DEVICE_qualcommax_ipq807x_DEVICE_aliyun_ap8220=y
        CONFIG_PACKAGE_cups=y
        CONFIG_PACKAGE_ghostscript=y
        CONFIG_PACKAGE_lcms2=y
        CONFIG_PACKAGE_qpdf=y
        CONFIG_PACKAGE_poppler=y
        CONFIG_PACKAGE_libcairo=y
        CONFIG_PACKAGE_libcupsfilters=y
        CONFIG_PACKAGE_libppd=y
        CONFIG_PACKAGE_cups-filters=y
        EOF

        make defconfig >/dev/null

    - name: Build printing packages (Single Thread Compile)
      run: |
        cd openwrt-sdk
        echo "=== Start building packages ==="
        # 按照正确的依赖顺序，并且【回归 compile 指令】！
        for pkg in lcms2 qpdf libcairo poppler libcupsfilters libppd cups-filters cups ghostscript; do
          if [ -d "package/feeds/printing/$pkg" ]; then
            echo ">>> Processing $pkg ..."
            make package/feeds/printing/$pkg/compile -j1 V=s || echo "!!! $pkg failed"
          fi
        done

    - name: List generated IPK files
      run: |
        cd openwrt-sdk
        echo "=== Printing IPK files ==="
        [ -d "bin" ] && find bin/ -type f -name "*.ipk" || echo "No IPK files found."

    - name: Upload all IPK artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ipq807x-printing-ipks
        path: openwrt-sdk/bin/packages/
