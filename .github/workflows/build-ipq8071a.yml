name: Build Printing Packages (IPQ807x SDK - Final Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gawk flex bison git wget unzip \
        python3 python3-pip python3-setuptools python3-wheel python3-dev \
        zstd libncurses-dev libssl-dev file rsync itstool gettext
    - name: Download and extract SDK
      run: |
        wget -q https://downloads.openwrt.org/releases/24.10.6/targets/qualcommax/ipq807x/openwrt-sdk-24.10.6-qualcommax-ipq807x_gcc-13.3.0_musl.Linux-x86_64.tar.zst
        tar -xf openwrt-sdk-24.10.6-qualcommax-ipq807x_gcc-13.3.0_musl.Linux-x86_64.tar.zst
        mv openwrt-sdk-24.10.6-qualcommax-ipq807x_gcc-13.3.0_musl.Linux-x86_64 openwrt-sdk

    - name: Configure feeds and target
      run: |
        cd openwrt-sdk
        cp feeds.conf.default feeds.conf
        echo "src-git printing https://github.com/woniuzfb/openwrt-24-printing-packages.git" >> feeds.conf
        ./scripts/feeds update -a >/dev/null
        ./scripts/feeds install -a >/dev/null

        # 核心补全：必须显式勾选要编译的包
        cat > .config <<'EOF'
        CONFIG_TARGET_qualcommax=y
        CONFIG_TARGET_qualcommax_ipq807x=y
        CONFIG_TARGET_DEVICE_qualcommax_ipq807x_DEVICE_aliyun_ap8220=y
        CONFIG_PACKAGE_cups=y
        CONFIG_PACKAGE_ghostscript=y
        CONFIG_PACKAGE_lcms2=y
        CONFIG_PACKAGE_qpdf=y
        CONFIG_PACKAGE_poppler=y
        CONFIG_PACKAGE_libcairo=y
        CONFIG_PACKAGE_libcupsfilters=y
        CONFIG_PACKAGE_libppd=y
        CONFIG_PACKAGE_cups-filters=y
        EOF

        make defconfig >/dev/null

    - name: Show printing feed packages
      run: |
        cd openwrt-sdk
        echo "=== Printing feed packages ==="
        ls -1 package/feeds/printing

    - name: Build printing packages (auto scan)
      run: |
        cd openwrt-sdk
        echo "=== Start building and packaging ==="
        for pkg in $(ls -1 package/feeds/printing); do
          if [ "$pkg" = "python3-dbus" ]; then continue; fi
          echo ">>> Processing $pkg ..."
          # 使用 install 指令确保生成 ipk
          make package/feeds/printing/$pkg/install -j$(nproc) || echo "!!! $pkg failed"
        done
        echo "=== Build finished ==="

    - name: List generated IPK files
      run: |
        cd openwrt-sdk
        echo "=== Printing IPK files ==="
        # 只要有一个包编译成功，bin 目录就会出现
        [ -d "bin" ] && find bin/ -type f -name "*.ipk" || echo "No IPK files found."

    - name: Upload all IPK artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: all-ipk
        path: openwrt-sdk/bin/packages/
